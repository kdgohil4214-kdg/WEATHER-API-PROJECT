<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather model </title>
    <link rel="stylesheet" href="style.css">


</head>

<body>

    <form id="form">

        <center>
            <h3> Atmosphere check</h3>
            <br>
            <input type="text" name="city" id="input" required placeholder="enter city name">

            <button type="submit">check it</button>


            <div id="container">
                <img src="" alt="" id="img">
                <div class="temp">
                    <h1 id="temperature"></h1>
                    <h2 id="city"></h2>
                </div>
            </div>

            <div class="box">
                <div class="row">
                    <div class="col">
                        <img src="" alt="" id="humidity-img">
                    </div>
                    <div class="col">
                        <p id="humidity-name"></p>
                        <p id="humidity"></p>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <img src="" alt="" id="speed-img">

                    </div>
                    <div class="col">
                        <p id="speed-name"></p>
                        <p id="speed"></p>
                    </div>
                </div>
            </div>


            <div id="not-found"></div>
        </center>

    </form>


    <script src="script.js"></script>
</body>

</html>
